# This workflow runs the test suite across a matrix of Python versions and
# torch versions on GitHub Actions — 3 Python versions x 3 torch "branches"
# (our declared floor, the old hard-pinned version, and unpinned-latest),
# to catch both Python-compat and torch-compat breaks. It also lints with
# ruff and does a smoke build of the package on every push/PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel a still-running CI run for this branch/PR when a new commit is
# pushed, instead of letting superseded runs finish and waste CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: python -m pip install ruff

      - name: Run ruff check
        run: ruff check .

  typecheck:
    name: typecheck (mypy, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mypy
        run: python -m pip install mypy

      # Advisory only: the codebase currently has ~290 pre-existing type
      # errors (see pyproject.toml's [tool.mypy] comment) — not fixed yet,
      # so this job reports but never fails the build. Remove
      # `continue-on-error` once the backlog is cleared and this should gate.
      - name: Run mypy
        continue-on-error: true
        run: python -m mypy src/depth_estimation

  build:
    name: build (smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

  test:
    name: test (py${{ matrix.python-version }}, torch==${{ matrix.torch-version || 'latest' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        # "2.0.1" = our declared minimum (torch>=2.0 in pyproject.toml).
        # "2.9.0" = the version we previously hard-pinned.
        # ""      = whatever pip resolves as latest — catches upcoming breaks early.
        torch-version: ["2.0.1", "2.9.0", ""]
        exclude:
          # torch==2.0.1 has no published wheel for Python 3.12.
          - python-version: "3.12"
            torch-version: "2.0.1"

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.1.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install the package without pulling in a torch version
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" --no-deps
          # numpy<2: torch==2.0.1's compiled extension predates NumPy 2.0's
          # ABI changes, so tensor.numpy() breaks under an unpinned (numpy 2.x)
          # install. numpy 1.x works fine across every torch version we test.
          python -m pip install pytest pytest-cov Pillow "numpy<2" matplotlib \
            opencv-python huggingface-hub transformers diffusers accelerate \
            timm einops addict h5py tqdm onnx onnxruntime

      - name: Install torch (CPU wheel)
        run: |
          if [ -z "${{ matrix.torch-version }}" ]; then
            python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          else
            python -m pip install "torch==${{ matrix.torch-version }}" torchvision --index-url https://download.pytorch.org/whl/cpu
          fi

      - name: Show installed packages
        run: python -m pip list

      - name: Test with PyTest
        run: python -m pytest -v -rsx tests -m "not slow"
