[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "depth_estimation"
version = "0.0.2"
description = "A Transformers-style Python library for monocular depth estimation"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
dependencies = [
    "torch>=2.0",
    "torchvision>=0.15",
    "Pillow>=9.0",
    "numpy>=1.24",
    "matplotlib>=3.6",
    "opencv-python>=4.8",
    "huggingface-hub>=0.16",
    "transformers>=4.30",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
]
da3 = [
    "depth-anything-3",
]
depth-pro = [
    "depth-pro",
]
ppd = [
    "ppd",
    "moge",
]
all = [
    "depth_estimation[da3,depth-pro,ppd]",
]

[tool.setuptools.packages.find]
where = ["src"]
